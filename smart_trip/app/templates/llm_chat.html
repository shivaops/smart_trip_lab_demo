{% extends "base.html" %}

{% block content %}
<div class="llm-shell">
  <div class="llm-topbar">
    <div class="llm-title">Smart Trip Travel Assistant Chat</div>
    <div class="llm-top-actions">
      <a href="/portal/flight/my-bookings-popup" class="btn secondary" target="_blank" rel="noopener">View My All Booking</a>
      <div class="llm-provider-chip">LLM Provider: {{ llm_provider_name }}{% if llm_provider_code %} ({{ llm_provider_code }}){% endif %}</div>
      <div class="llm-session-chip">Session #{{ session_id }}</div>
      <a class="btn secondary" href="/">Back</a>
    </div>
  </div>

  <section class="llm-chat-card">
    <div class="llm-messages" id="llmMessages">
      <div class="msg msg-assistant" id="initialSystemMsg">
        <div class="msg-role">Assistant</div>
        <div class="msg-body">&nbsp;</div>
      </div>
    </div>

    <div class="llm-input-wrap">
      <div class="llm-input-row">
        <textarea id="llmInput" class="llm-input" rows="3" placeholder="Type your travel request here..."></textarea>
        <button type="button" class="btn" id="llmSendBtn">Send</button>
      </div>
    </div>
  </section>
</div>

<script>
function markControlLocked(el, titleText){
  if (!el || el.dataset.llmLocked === '1') return;

  el.dataset.llmLocked = '1';
  el.classList.add('llm-control-locked');
  el.setAttribute('aria-disabled', 'true');

  if (titleText) {
    el.title = titleText;
  }

  if ('disabled' in el) {
    el.disabled = true;
  }
}

function lockFlightSelectButton(el, selected){
  if (!el) return;
  markControlLocked(el, selected ? 'This flight option is selected.' : 'Flight selection is already selected.');
  if ('disabled' in el) el.disabled = true;
  el.tabIndex = -1;
  el.style.pointerEvents = 'none';
  if (selected) {
    el.textContent = 'Selected';
    const cardEl = el.closest('.llm-card');
    if (cardEl) cardEl.classList.add('llm-flight-selected');
  } else if (!selected && String(el.textContent || '').trim().toLowerCase() === 'select option') {
    el.textContent = 'Locked';
  }
}

function lockFlightResultFilterCard(shell){
  if (!shell) return;
  shell.dataset.resultsLocked = 'Y';
  const filterBar = shell.querySelector('.llm-filter-bar');
  if (!filterBar) return;
  filterBar.classList.add('llm-filter-locked');
  filterBar.querySelectorAll('select,input,button').forEach(el => {
    markControlLocked(el, 'Flight option is already selected. Start a new search to change filters.');
    if ('disabled' in el) el.disabled = true;
    el.tabIndex = -1;
    el.style.pointerEvents = 'none';
  });
}

function lockPriorFlightResultFilterCards(){
  document.querySelectorAll('.llm-results-shell').forEach(shell => lockFlightResultFilterCard(shell));
}

function lockPriorFlightSelectionControls(selectedAgentFsrId){
  const selectedId = String(selectedAgentFsrId || '').trim();
  const activeSelectedId = selectedId || String((chatState && chatState.selectedResult && chatState.selectedResult.agent_fsr_id) || '').trim();
  document.querySelectorAll('.llm-select-option-btn, [data-action="select-option"]').forEach(el => {
    const isSelected = activeSelectedId && String(el.dataset.agentFsrId || '').trim() === activeSelectedId;
    lockFlightSelectButton(el, !!isSelected);
  });
  if (activeSelectedId) {
    lockPriorFlightResultFilterCards();
  }
}

function lockPriorFareSelectionControls(){
  document.querySelectorAll('.llm-fare-parent .llm-fare-card').forEach(card => {
    markControlLocked(card, 'Fare selection is already selected.');
    card.style.pointerEvents = 'none';

    const radio = card.querySelector('input[type="radio"]');
    if (radio) {
      radio.disabled = true;
      radio.tabIndex = -1;
      radio.setAttribute('aria-disabled', 'true');
    }
  });
}

function lockPriorChoiceControls(){
  lockPriorFlightSelectionControls();
  lockPriorFareSelectionControls();
}

(function(){
  const input = document.getElementById('llmInput');
  const btn = document.getElementById('llmSendBtn');
  const box = document.getElementById('llmMessages');
  const initialSystemMsg = document.getElementById('initialSystemMsg');
  const TODAY_DATE = '{{ today_date }}';
  const PROVIDER_CODE = '{{ llm_provider_code }}';
  const PROVIDER_NAME = '{{ llm_provider_name|default("")|e }}';
  const SESSION_ID = '{{ session_id }}';
  const STORAGE_KEY = `tt_llm_state_${SESSION_ID}`;
  const NAV_ENTRIES = (performance.getEntriesByType && performance.getEntriesByType('navigation')) || [];
  const IS_BROWSER_RELOAD = !!(NAV_ENTRIES.length && NAV_ENTRIES[0].type === 'reload');

  const chatState = {
    pendingDateConfirmation: null,
    pendingMissingField: null,
    lastOriginalMessage: null,
    lastNormalizedIntent: null,
    lastRoutePayload: null,
    lastSearchResults: null,
    visibleFlightResults: null,
    selectedResult: null,
    selectedFareStage: null,
    selectedTravelerStage: null,
    bookingSummaryStage: null,
    inputContext: { mode: 'travel_request' }
  };

  const PAYMENT_EVENT_KEY = `tt_llm_payment_done_${SESSION_ID}`;
  let lastPaymentHandledRef = null;
  let chatInputLocked = false;
  let typingMessageEl = null;
  let resultSelectionInProgress = false;

  function scrollBottom(){ box.scrollTop = box.scrollHeight; }
  function formatAmount(value, decimals = 0){
    const num = Number(value || 0);
    if (!Number.isFinite(num)) return String(value || '');
    return num.toLocaleString('en-IN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }
  function formatMoney(currency, value, decimals = 2){
    const amount = formatAmount(value, decimals);
    return `${currency ? currency + ' ' : ''}${amount}`.trim();
  }
  function saveState(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chatState)); } catch (e) {} }
  function restoreState(){ try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return; const saved = JSON.parse(raw); if (saved && typeof saved === 'object') Object.assign(chatState, saved);} catch (e) {} }
  function clearFlowState(){
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    try { localStorage.removeItem(PAYMENT_EVENT_KEY); } catch (e) {}
    try {
      for (let i = localStorage.length - 1; i >= 0; i -= 1) {
        const key = localStorage.key(i);
        if (key && (key.indexOf('tt_llm_state_') === 0 || key.indexOf('tt_llm_payment_done_') === 0)) {
          localStorage.removeItem(key);
        }
      }
    } catch (e) {}
    try {
      for (let i = sessionStorage.length - 1; i >= 0; i -= 1) {
        const key = sessionStorage.key(i);
        if (key && (key.indexOf('tt_llm_state_') === 0 || key.indexOf('tt_llm_payment_done_') === 0 || key.indexOf('tt_llm_') === 0)) {
          sessionStorage.removeItem(key);
        }
      }
    } catch (e) {}
    chatState.pendingDateConfirmation = null;
    chatState.pendingMissingField = null;
    chatState.lastOriginalMessage = null;
    chatState.lastNormalizedIntent = null;
    chatState.lastRoutePayload = null;
    chatState.lastSearchResults = null;
    chatState.visibleFlightResults = null;
    chatState.selectedResult = null;
    chatState.selectedVisibleOptionLabel = null;
    chatState.selectedFareStage = null;
    chatState.selectedTravelerStage = null;
    chatState.bookingSummaryStage = null;
    chatState.inputContext = { mode: 'travel_request' };
    chatInputLocked = false;
    lastPaymentHandledRef = null;
    resultSelectionInProgress = false;
    try { if (input) input.value = ''; } catch (e) {}
  }

  function placeholderForContext(){
    const ctx = (chatState && chatState.inputContext) || {};
    if (chatInputLocked || ctx.mode === 'completed') return 'Booking completed. Start a new booking to continue.';
    if (ctx.mode === 'flight_option') return 'Select flight option. Examples: Option 1 or just 1';
    if (ctx.mode === 'fare_option') {
      if (String(ctx.trip_type || 'ONE_WAY') === 'ROUND_TRIP') {
        try {
          const parent = getActiveFareParent();
          const status = roundTripFareSelectionStatus(parent);
          if (status.outboundSelected && !status.returnSelected) return 'Select remaining return fare. Examples: Return Option 1, Return Economy Flex, Return Eco Flex, Return Flex';
          if (status.returnSelected && !status.outboundSelected) return 'Select remaining outbound fare. Examples: Outbound Option 1, Outbound Economy Flex, Outbound Eco Flex, Outbound Flex';
        } catch (e) {}
        return 'Select fare. Examples: Outbound Option 1, Outbound Economy Flex, Outbound Eco Flex, Outbound Flex';
      }
      return 'Select fare. Examples: Option 1, Economy Flex, Eco Flex, Flex';
    }
    if (ctx.mode === 'traveler_action') return 'Please use one of the traveller options above to continue. Choose "Use Saved Travellers" to select from your saved traveller records, or "Manage Traveller Docs" to review and update traveller details first.';
    if (ctx.mode === 'traveler_select') return 'Please select the required traveller(s) from the list above, then click "Confirm Traveller Selection" to continue.';
    if (ctx.mode === 'traveler_review') return 'Please review the traveller selection message above and choose either "Yes, Continue" to proceed with the current selection or "No, Adjust Selection" to make changes.';
    if (ctx.mode === 'booking_review') return 'Please click "Confirm Booking" or "Start New Search" above to continue.';
    if (ctx.mode === 'payment_pending') return 'Please click "Proceed to Payment" above to complete payment and continue.';
    if (ctx.mode === 'missing_fields_review') return 'Please use the correction fields above, then click Continue Search.';
    return 'Type your travel request here...';
  }

  function refreshInputPlaceholder(){
    input.placeholder = placeholderForContext();
  }

  function setInputContext(mode, extra){
    chatState.inputContext = Object.assign({ mode: String(mode || 'travel_request') }, extra || {});
    saveState();
    const ctxMode = String((chatState.inputContext && chatState.inputContext.mode) || 'travel_request');
    const buttonLockedModes = new Set(['traveler_action', 'traveler_select', 'traveler_review', 'booking_review', 'payment_pending', 'missing_fields_review']);
    if (ctxMode === 'completed') {
      input.title = 'Booking is completed. Start a new booking to continue.';
      setChatInputLocked(true);
      return;
    }
    if (buttonLockedModes.has(ctxMode)) {
      input.disabled = true;
      input.title = 'Input is disabled for this step. Please use the button/action above.';
      btn.disabled = true;
      refreshInputPlaceholder();
      btn.textContent = 'Use Buttons Above';
      return;
    }
    if (!chatInputLocked) {
      input.disabled = false;
      input.title = '';
      btn.disabled = false;
      btn.textContent = 'Send';
      refreshInputPlaceholder();
    }
  }

  function clearInputContext(mode){
    const current = (chatState && chatState.inputContext && chatState.inputContext.mode) || 'travel_request';
    if (!mode || current === mode) setInputContext('travel_request');
  }

  function resetSearchSelectionState(){
    chatState.pendingMissingField = null;
    chatState.lastSearchResults = null;
    chatState.visibleFlightResults = null;
    chatState.selectedResult = null;
    chatState.selectedFareStage = null;
    chatState.selectedTravelerStage = null;
    chatState.bookingSummaryStage = null;
    setInputContext('travel_request');
    saveState();
  }

  function looksLikeNewTravelRequest(text){
    const raw = String(text || '').trim().toLowerCase();
    if (!raw) return false;
    if (/^option\s*#?\s*\d+$/i.test(raw) || /^\d+$/.test(raw)) return false;
    return /\b(book|flight|return|round\s*trip|one\s*way|multi\s*city|from|to|adult|child|infant|currency|cabin|depart|departure|travel|mumbai|manama|bahrain|dubai)\b/i.test(raw);
  }

  function isButtonLockedContext(){
    const ctxMode = String((chatState.inputContext && chatState.inputContext.mode) || 'travel_request');
    return ['traveler_action', 'traveler_select', 'traveler_review', 'booking_review', 'payment_pending', 'missing_fields_review'].includes(ctxMode);
  }

  function setChatInputLocked(isLocked){
    chatInputLocked = !!isLocked;
    if (chatInputLocked) {
      input.disabled = true;
      btn.disabled = true;
      btn.textContent = 'Completed';
      refreshInputPlaceholder();
      return;
    }
    if (isButtonLockedContext()) {
      input.disabled = true;
      btn.disabled = true;
      btn.textContent = 'Use Buttons Above';
      refreshInputPlaceholder();
      return;
    }
    input.disabled = false;
    btn.disabled = false;
    refreshInputPlaceholder();
    btn.textContent = 'Send';
  }

  function escapeHtml(value){
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function planeBusyMarkup(message, compact){
    const safeMessage = escapeHtml(message || 'Please wait, I am reviewing your request...');
    return `
      <div class="llm-plane-loader ${compact ? 'compact' : ''}" aria-live="polite" aria-label="${safeMessage}">
        <div class="llm-plane-sky" aria-hidden="true">

          <div class="llm-plane-icon">✈</div>

  function showBusyIndicator(){
    if (typingMessageEl) return;
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-assistant msg-typing';
    wrap.innerHTML = '<div class="msg-role">Assistant</div><div class="msg-body"></div>' + planeBusyMarkup('Please wait, I am reviewing your travel request...', true);
    typingMessageEl = wrap;
    box.appendChild(wrap);

  function hideBusyIndicator(){
    if (!typingMessageEl) return;
    if (typingMessageEl.parentNode) typingMessageEl.parentNode.removeChild(typingMessageEl);
    typingMessageEl = null;
  }

  function llmPause(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function showAssistantThinkingFor(ms){
    showBusyIndicator();
    try {
      await llmPause(ms || 1000);
    } finally {
      hideBusyIndicator();
    }
  }

  async function showAssistantThinkingTextFor(text, ms){
    hideBusyIndicator();
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-assistant msg-typing';

  function setBusy(isBusy){
    const buttonLocked = isButtonLockedContext();
    btn.disabled = isBusy || chatInputLocked || buttonLocked;
    input.disabled = isBusy || chatInputLocked || buttonLocked;
    btn.textContent = chatInputLocked ? 'Completed' : (buttonLocked ? 'Use Buttons Above' : 'Send');
    refreshInputPlaceholder();
    if (chatInputLocked || buttonLocked || !isBusy) hideBusyIndicator();
    else showBusyIndicator();
  }

  function parseTypedFlightOption(text){
    const raw = String(text || '').trim();
    if (!raw) return null;
    let match = raw.match(/^(?:select\s+)?option\s*#?\s*(\d+)$/i);
    if (!match) match = raw.match(/^#?(\d+)$/);
    if (!match) return null;
    const optionNumber = Number(match[1] || 0);
    return Number.isFinite(optionNumber) && optionNumber > 0 ? optionNumber : null;
  }

  function normalizeFareText(value){
    return String(value || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function resolveFareFamilyOption(listEl, rawText){
    if (!listEl) return null;
    const text = normalizeFareText(rawText);
    if (!text) return null;

    const cards = Array.from(listEl.querySelectorAll('.llm-fare-card'));
    if (!cards.length) return null;

    const familySpecs = [
      { canon: 'flex', aliases: ['economy flex', 'eco flex', 'flex'] },
      { canon: 'smart', aliases: ['economy smart', 'eco smart', 'smart'] },
      { canon: 'light', aliases: ['economy light', 'eco light', 'light'] },
      { canon: 'economy', aliases: ['economy', 'eco'] }
    ];

    const matchedSpec = familySpecs.find((spec) => spec.aliases.some((alias) => text === alias || text.includes(alias)));
    if (!matchedSpec) return null;

    const matchedIndex = cards.findIndex((card) => normalizeFareText(card.dataset.family || '').includes(matchedSpec.canon));
    if (matchedIndex >= 0) {
      return { optionNumber: matchedIndex + 1, matchedFamily: matchedSpec.canon };
    }

    if (matchedSpec.canon === 'economy' && cards.length === 1) {
      return { optionNumber: 1, matchedFamily: matchedSpec.canon };
    }

    return null;
  }

  function parseTypedFareOption(text, context){
    const raw = String(text || '').trim();
    if (!raw) return null;
    const ctx = context || {};
    const tripType = String(ctx.trip_type || 'ONE_WAY');
    const toPositive = (value) => { const n = Number(value || 0); return Number.isFinite(n) && n > 0 ? n : null; };
    const activeParent = getActiveFareParent();

    if (tripType === 'ROUND_TRIP') {
      let match = raw.match(/^(outbound|return)\s+(?:fare\s+)?option\s*#?\s*(\d+)$/i);
      if (!match) match = raw.match(/^(outbound|return)\s+#?(\d+)$/i);
      if (match) return { side: String(match[1] || '').toLowerCase(), optionNumber: toPositive(match[2]) };

      const normalizedRaw = normalizeFareText(raw);
      const side = normalizedRaw.startsWith('return ') ? 'return' : (normalizedRaw.startsWith('outbound ') ? 'outbound' : null);
      if (!side) return null;
      const familyText = normalizedRaw.replace(/^(outbound|return)\s+/, '').trim();
      const listEl = getFareListForSide(activeParent, side);
      const familyMatch = resolveFareFamilyOption(listEl, familyText);
      return familyMatch ? { side, optionNumber: familyMatch.optionNumber, matchedFamily: familyMatch.matchedFamily } : null;
    }

    let match = raw.match(/^(?:select\s+)?(?:fare\s+)?option\s*#?\s*(\d+)$/i);
    if (!match) match = raw.match(/^#?(\d+)$/);
    if (match) {
      const optionNumber = toPositive(match[1]);
      return optionNumber ? { side: 'outbound', optionNumber } : null;
    }

    const listEl = getFareListForSide(activeParent, 'outbound');
    const familyMatch = resolveFareFamilyOption(listEl, raw);
    return familyMatch ? { side: 'outbound', optionNumber: familyMatch.optionNumber, matchedFamily: familyMatch.matchedFamily } : null;
  }

  function fareOptionHintForSide(side, count){
    const safeSide = side === 'return' ? 'Return' : 'Outbound';
    return `${safeSide} Option 1, ${safeSide} Economy Flex, ${safeSide} Eco Flex, or ${safeSide} Flex`;
  }

  function roundTripFareSelectionStatus(parent){
    const outboundSelected = !!(parent && parent.dataset && parent.dataset.llmManualOutbound === '1');
    const returnSelected = !!(parent && parent.dataset && parent.dataset.llmManualReturn === '1');
    const outboundList = getFareListForSide(parent, 'outbound');
    const returnList = getFareListForSide(parent, 'return');
    const outboundCount = outboundList ? outboundList.querySelectorAll('.llm-fare-card').length : 0;
    const returnCount = returnList ? returnList.querySelectorAll('.llm-fare-card').length : 0;
    return { outboundSelected, returnSelected, outboundCount, returnCount };
  }

  function invalidFareOptionMessage(){
    const ctx = (chatState && chatState.inputContext) || {};
    if (String(ctx.trip_type || 'ONE_WAY') === 'ROUND_TRIP') {
      const parent = getActiveFareParent();
      const status = roundTripFareSelectionStatus(parent);
      if (status.outboundSelected && !status.returnSelected) {
        return `I could not match that return fare option. Your outbound fare is already selected. Please type ${fareOptionHintForSide('return', status.returnCount)}.`;
      }
      if (status.returnSelected && !status.outboundSelected) {
        return `I could not match that outbound fare option. Your return fare is already selected. Please type ${fareOptionHintForSide('outbound', status.outboundCount)}.`;
      }
      return `I could not match that fare option. Please type ${fareOptionHintForSide('outbound', status.outboundCount)}. For return fare, type ${fareOptionHintForSide('return', status.returnCount)}.`;
    }
    const count = Number(ctx.option_count || 0);
    if (count > 0) return 'I could not match that fare option. Please type Option 1, Economy Flex, Eco Flex, or Flex.';
    return 'I could not match that fare option. Please type Option 1, Economy Flex, Eco Flex, or Flex.';
  }

  function getActiveFareParent(){
    const parents = Array.from(document.querySelectorAll('.llm-fare-parent'));
    return parents.length ? parents[parents.length - 1] : null;
  }

  function getFareListForSide(parent, side){
    if (!parent) return null;
    const blocks = Array.from(parent.querySelectorAll('.llm-fare-block'));
    for (const block of blocks) {
      const titleEl = block.querySelector('.llm-fare-block-title');
      const listEl = block.querySelector('.llm-fare-list');
      const title = String(titleEl ? titleEl.textContent || '' : '').toLowerCase();
      if (side === 'return' && title.includes('return')) return listEl;
      if (side === 'outbound' && title.includes('outbound')) return listEl;
    }
    return null;
  }

  function handleTypedFareOption(text){
    const ctx = (chatState && chatState.inputContext) || {};
    const parsed = parseTypedFareOption(text, ctx);
    if (!parsed || !parsed.optionNumber) {
      appendMessage('assistant', invalidFareOptionMessage());
      return true;
    }
    const parent = getActiveFareParent();
    const listEl = getFareListForSide(parent, parsed.side || 'outbound');
    const cards = Array.from(listEl ? listEl.querySelectorAll('.llm-fare-card') : []);
    const target = cards[parsed.optionNumber - 1];
    if (!target) {
      appendMessage('assistant', invalidFareOptionMessage());
      return true;
    }

    const tripType = String(ctx.trip_type || 'ONE_WAY');
    if (tripType === 'ROUND_TRIP') {
      const status = roundTripFareSelectionStatus(parent);
      if (parsed.side === 'outbound' && status.outboundSelected && !status.returnSelected) {
        appendMessage('assistant', `Your outbound fare is already selected. Please select the remaining return fare option. Type ${fareOptionHintForSide('return', status.returnCount)}.`);
        return true;
      }
      if (parsed.side === 'return' && status.returnSelected && !status.outboundSelected) {
        appendMessage('assistant', `Your return fare is already selected. Please select the remaining outbound fare option. Type ${fareOptionHintForSide('outbound', status.outboundCount)}.`);
        return true;
      }
    }

    const actualOptionNumber = Math.max(1, cards.indexOf(target) + 1);
    target.click();

    const family = String(target.dataset.family || '').trim();
    const currency = String(target.dataset.currency || '').trim();
    const total = Number(target.dataset.total || 0);
    const optionLabel = `Option ${actualOptionNumber}`;
    const fareText = family ? family : 'selected fare';

    let reply = '';
    let shouldMoveTravelerShell = false;

    if (tripType === 'ROUND_TRIP') {
      const sideLabel = parsed.side === 'return' ? 'Return' : 'Outbound';
      reply = `You have selected ${sideLabel} ${optionLabel}${family ? ` — ${fareText}` : ''}.`;
      const outboundCount = Number(ctx.option_count || 0);
      const returnCount = Number(ctx.return_option_count || 0);
      const manualOutbound = parent && parent.dataset && parent.dataset.llmManualOutbound === '1';
      const manualReturn = parent && parent.dataset && parent.dataset.llmManualReturn === '1';
      const bothRoundTripFaresSelected = Boolean(manualOutbound && manualReturn);
      if (!bothRoundTripFaresSelected) {
        const remainingSide = parsed.side === 'return' ? 'outbound' : 'return';
        reply += ` Please continue with the remaining ${remainingSide} fare selection.`;
      } else {
        reply += ' Please continue with traveller selection. click on below button "Use Saved Travellers" to choose from your saved traveller list, or "Manage Traveller Docs" to review and update traveller details first.';
        shouldMoveTravelerShell = true;
      }
    } else {
      const totalText = Number.isFinite(total) && total > 0 ? ` (${formatMoney(currency, total, 2)})` : '';
      reply = `You have selected ${optionLabel}${family ? ` — ${fareText}` : ''}${totalText}. Please continue with traveller selection. click on below button "Use Saved Travellers" to choose from your saved traveller list, or "Manage Traveller Docs" to review and update traveller details first.`;
      shouldMoveTravelerShell = true;
    }

    let travelerShell = null;
    if (shouldMoveTravelerShell) {
      setInputContext('traveler_action');
      const allTravelerShells = Array.from(document.querySelectorAll('.llm-traveler-shell'));
      travelerShell = allTravelerShells.length ? allTravelerShells[allTravelerShells.length - 1] : null;
      if (travelerShell && travelerShell.parentNode) {
        travelerShell.parentNode.removeChild(travelerShell);
      }
    }

    appendMessage('assistant', reply, null, (wrap) => {
      if (shouldMoveTravelerShell && travelerShell) {
        travelerShell.style.display = '';
        wrap.appendChild(travelerShell);
      }
    });
    return true;
  }

  function getSearchResultsList(){
    return Array.isArray(chatState.lastSearchResults && chatState.lastSearchResults.results) ? chatState.lastSearchResults.results : [];
  }

  function getVisibleFlightResultsList(){
    return Array.isArray(chatState.visibleFlightResults)
      ? chatState.visibleFlightResults
      : getSearchResultsList();
  }

  function extractOptionNumberFromLabel(label){
    const raw = String(label || '').trim();
    if (!raw) return null;
    const match = raw.match(/option\s*#?\s*(\d+)/i);
    if (!match) return null;
    const n = Number(match[1] || 0);
    return Number.isFinite(n) && n > 0 ? n : null;
  }

  function optionCabinFromCard(card){
    const rawLabel = String(card && card.option_label || '').trim();
    const dotPos = rawLabel.indexOf('·');
    if (dotPos >= 0) {
      const labelCabin = rawLabel.slice(dotPos + 1).trim();
      if (labelCabin) return labelCabin;
    }
    const out = card && card.outbound ? card.outbound : {};
    const ret = card && card.return_leg ? card.return_leg : {};
    const outCabin = String(out.cabin_class || out.travel_class || '').trim();
    const retCabin = String(ret.cabin_class || ret.travel_class || '').trim();
    if (outCabin && retCabin && outCabin.toUpperCase() !== retCabin.toUpperCase()) return `${outCabin} / ${retCabin}`;
    return outCabin || retCabin || String(card && (card.cabin_class || card.travel_class) || '').trim() || 'Economy';
  }

  function displayOptionLabel(card, idx){
    const visibleNumber = Number(idx || 0) + 1;
    return `Option ${visibleNumber} · ${optionCabinFromCard(card)}`;
  }

  function findFlightOptionCardByNumber(optionNumber){
    const results = getVisibleFlightResultsList();
    if (!results.length || !Number.isFinite(optionNumber) || optionNumber < 1) return null;
    return results[optionNumber - 1] || null;
  }

  function invalidFlightOptionMessage(){
    const results = getVisibleFlightResultsList();
    const labels = results.slice(0, 3).map((card, idx) => displayOptionLabel(card, idx)).filter(Boolean);
    const hint = labels.length ? ` Kindly type ${labels.join(' or ')}${results.length > 3 ? ' etc.' : '.'}` : ' Kindly type Option 1 or Option 2 for example.';
    return `I could not match that flight option.${hint}`;
  }

  function appendMessage(role, text, summary, extrasBuilder){
    const wrap = document.createElement('div');
    wrap.className = role === 'user' ? 'msg msg-user' : 'msg msg-assistant';
    wrap.innerHTML = '<div class="msg-role"></div><div class="msg-body"></div>';
    wrap.querySelector('.msg-role').textContent = role === 'user' ? 'You' : 'Assistant';
    wrap.querySelector('.msg-body').textContent = text || '';
    if (summary && Object.keys(summary).length) {
      const grid = document.createElement('div');
      grid.className = 'assist-grid';
      Object.entries(summary).forEach(([k,v]) => {
        if (v === null || v === undefined || v === '') return;
        const item = document.createElement('div');
        item.className = 'assist-item';
        item.innerHTML = '<div class="assist-key"></div><div class="assist-val"></div>';
        item.querySelector('.assist-key').textContent = k;
        item.querySelector('.assist-val').textContent = String(v);
        grid.appendChild(item);
      });
      if (grid.children.length) wrap.appendChild(grid);
    }
    if (typeof extrasBuilder === 'function') {
      extrasBuilder(wrap);
    }
    box.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function buildSummary(data){
    const ni = data && data.normalized_intent ? data.normalized_intent : null;
    if (!ni) return null;
    return {
      'Trip Type': formatTripType(ni.trip_type || 'ONE_WAY'),
      'From': ni.from_city || '',
      'To': ni.to_city || '',
      'Departure Date': formatShortDate(ni.depart_date || ''),
      'Return Date': formatShortDate(ni.return_date || ''),
      'Cabin Class': ni.cabin_class || '',
      'Currency': ni.currency || '',
      'Travellers': [ni.adults ? `${ni.adults} Adult${Number(ni.adults) > 1 ? 's' : ''}` : '', ni.children ? `${ni.children} Child${Number(ni.children) > 1 ? 'ren' : ''}` : '', ni.infants ? `${ni.infants} Infant${Number(ni.infants) > 1 ? 's' : ''}` : ''].filter(Boolean).join(', '),
      'Preferred Airline': ni.preferred_airline || ''
    };
  }

  function currentMissingField(){
    const pending = chatState.pendingMissingField;
    if (!pending || !Array.isArray(pending.missingFields) || !pending.missingFields.length) return null;
    return pending.missingFields[0];
  }
  function rememberPendingMissingField(data){
    chatState.pendingMissingField = {
      missingFields: Array.isArray(data && data.missing_fields) ? data.missing_fields : [],
      routePayload: (data && data.route_payload) ? data.route_payload : (chatState.lastRoutePayload || {})
    };
    chatState.lastRoutePayload = chatState.pendingMissingField.routePayload;
    saveState();
  }
  function clearPendingMissingField(){ chatState.pendingMissingField = null; saveState(); }
  function fieldReplyHint(field){ return (field && field.hint) ? String(field.hint) : ''; }
  function missingFieldPrompt(field){ return String((field && field.prompt) || 'Please provide the next missing detail.').replace(/\{options\}/g, '').replace(/\*{3,}/g, '').trim(); }
  function getPendingMissingFields(){ return Array.isArray(chatState.pendingMissingField && chatState.pendingMissingField.missingFields) ? chatState.pendingMissingField.missingFields : []; }
  function friendlyMissingLabel(field){
    const key = String((field && (field.route_key || field.name)) || '').trim();
    if (key === 'from_city') return 'Departure Airport';
    if (key === 'to_city') return 'Arrival Airport';
    if (key === 'depart_date') return 'Departure Date';
    if (key === 'return_date') return 'Return Date';
    if (key === 'cabin_class') return 'Cabin Class';
    if (key === 'currency') return 'Currency';
    if (key === 'preferred_airline') return 'Preferred Airline';
    return String((field && field.label) || key || 'Detail').trim();
  }
  function sourceValueForField(field){
    const ni = chatState.lastNormalizedIntent || {};
    const key = String((field && (field.route_key || field.name)) || '').trim();
    if (key === 'from_city') return String(ni.from_city || '').trim();
    if (key === 'to_city') return String(ni.to_city || '').trim();
    if (key === 'depart_date') return String(ni.depart_date_raw || ni.depart_date || '').trim();
    if (key === 'return_date') return String(ni.return_date_raw || ni.return_date || '').trim();
    if (key === 'cabin_class') return String(ni.cabin_class || '').trim();
    if (key === 'currency') return String(ni.currency || '').trim();
    if (key === 'preferred_airline') return String(ni.preferred_airline || '').trim();
    return '';
  }
  function correctionIntroMessage(){
    const fields = getPendingMissingFields();
    const hasInvalid = fields.some(f => !!sourceValueForField(f));
    if (hasInvalid) return 'I understood part of your request, but a few details need correction before I can continue.';
    return 'Please review and complete all these details before I continue.';
  }

  function buildAcceptedDetailsForCorrection(){
    const ni = chatState.lastNormalizedIntent || {};
    const pendingKeys = new Set(getPendingMissingFields().map(f => String((f && (f.route_key || f.name)) || '').trim()));
    const out = {};
    const add = (label, value) => {
      const cleaned = String(value || '').trim();
      if (!cleaned) return;
      out[label] = cleaned;
    };

    if (!pendingKeys.has('from_city')) add('From City/Airport', ni.from_city || '');
    if (!pendingKeys.has('to_city')) add('To City/Airport', ni.to_city || '');
    if (!pendingKeys.has('trip_type')) add('Trip Type', formatTripType(ni.trip_type || 'ONE_WAY'));
    if (!pendingKeys.has('depart_date')) add('Departure Date', formatShortDate(ni.depart_date || ''));
    if (!pendingKeys.has('return_date') && String(ni.trip_type || '').toUpperCase() === 'ROUND_TRIP') add('Return Date', formatShortDate(ni.return_date || ''));
    if (!pendingKeys.has('cabin_class')) add('Cabin Class', ni.cabin_class || '');
    if (!pendingKeys.has('currency')) add('Currency', ni.currency || '');
    if (!pendingKeys.has('preferred_airline')) add('Preferred Airline', ni.preferred_airline || '');

    const travelers = [
      ni.adults ? `${ni.adults} Adult${Number(ni.adults) > 1 ? 's' : ''}` : '',
      ni.children ? `${ni.children} Child${Number(ni.children) > 1 ? 'ren' : ''}` : '',
      ni.infants ? `${ni.infants} Infant${Number(ni.infants) > 1 ? 's' : ''}` : ''
    ].filter(Boolean).join(', ');

  function providerConnectionMessage(rawText){
    const text = String(rawText || '').trim();
    const lower = text.toLowerCase();
    const providerName = PROVIDER_NAME || PROVIDER_CODE || 'the selected LLM provider';
    const hints = ['http 503','temporarily unavailable','connection refused','timed out','timeout','quota','billing','rate limit'];
    if (hints.some(h => lower.includes(h))) return `Unable to connect to ${providerName}. Please try again later.`;
    return text;
  }

  function extractBookingRef(value){
    const raw = String(value || '').trim();
    if (!raw) return '';
    let match = raw.match(/booking_ref=([A-Za-z0-9_-]+)/i);
    if (match && match[1]) return String(match[1]).trim();
    match = raw.match(/\bRef:\s*([A-Za-z0-9_-]+)\b/i);
    if (match && match[1]) return String(match[1]).trim();
    match = raw.match(/\b([A-Z0-9]{6,})\b/);
    if (match && match[1]) return String(match[1]).trim();
    return '';
  }

  function resolveBookingSummaryUrl(payload){
    const candidates = [
      payload && payload.view_booking_url,
      payload && payload.manage_booking_url,
      payload && payload.booking_summary_url,
      payload && payload.payment_url,
      payload && payload.user_message,
      payload && payload.booking_ref
    ];
    for (const candidate of candidates) {
      const raw = String(candidate || '').trim();
      if (!raw) continue;
      if (/\/portal\/flight\/booking-summary\?booking_ref=.+/i.test(raw)) return raw;
      const ref = extractBookingRef(raw);
      if (ref) return `/portal/flight/booking-summary?booking_ref=${encodeURIComponent(ref)}`;
    }
    return '#';
  }

  async function handleJsonResponse(resp){
    const contentType = resp.headers.get('content-type') || '';
    if (!resp.ok) {
      if (contentType.includes('application/json')) {
        const err = await resp.json();
        const msg = err.user_message || err.detail || err.message || (Array.isArray(err.errors) ? err.errors.join('\n') : 'Unable to process your request right now.');
        throw new Error(providerConnectionMessage(msg));
      }
      throw new Error('Active application session not found. Please sign in again.');
    }
    if (!contentType.includes('application/json')) throw new Error(`Unexpected non-JSON response returned (HTTP ${resp.status}).`);
    const data = await resp.json();
    if (data && data.status === 'FAILED') throw new Error(providerConnectionMessage(data.user_message || (Array.isArray(data.errors) ? data.errors.join('\n') : 'Unable to process your request right now.')));
    return data;
  }

  async function routeToSearch(routePayload){

      appendAssistantResults(data);
      return;
    }
    throw new Error('Unexpected response returned while routing to search.');
  }

  function parseFlexibleDateInput(text){
    const raw = String(text || '').trim(); if (!raw) return null;
    const t = raw.toLowerCase().replace(/,/g,' ').replace(/\s+/g,' ').trim();
    function ymd(d){ const yyyy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${yyyy}-${mm}-${dd}`; }
    const today = new Date(TODAY_DATE + 'T00:00:00');
    const clean = t.replace('tomorow','tomorrow');
    if (clean === 'today') return ymd(today);
    if (clean.includes('day after tomorrow')) { const d=new Date(today); d.setDate(d.getDate()+2); return ymd(d); }
    if (clean.includes('tomorrow')) { const d=new Date(today); d.setDate(d.getDate()+1); return ymd(d); }
    let m = clean.match(/(\d{4})-(\d{1,2})-(\d{1,2})/); if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    m = clean.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/); if (m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
    m = clean.match(/(\d{1,2})[- ]([a-z]{3})[- ](\d{4})/); if (m) { const months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'}; const mon=months[m[2].slice(0,3)]; if (mon) return `${m[3]}-${mon}-${String(m[1]).padStart(2,'0')}`; }
    return null;
  }

  function resolveMissingFieldAnswer(text, field){
    const raw = String(text || '').trim();
    if (!field || !raw) return null;
    const key = String(field.route_key || field.name || '').trim();
    if (key === 'depart_date' || key === 'return_date') return parseFlexibleDateInput(raw);
    const options = Array.isArray(field.options) ? field.options : [];
    if (options.length) {
      const needle = raw.toLowerCase();
      const exact = options.find(opt => {
        const value = String(opt.value || '').trim().toLowerCase();
        const label = String(opt.label || '').trim().toLowerCase();
        return needle === value || needle === label || label.startsWith(needle) || value.startsWith(needle) || label.includes(needle);
      });
      if (exact) return exact.value || exact.label;
      if (key === 'from_city' || key === 'to_city') return raw;
      return null;
    }
    return raw;
  }

          const sel = document.createElement('select');

          sel.innerHTML = '<option value="">Select an option</option>' + options.map(opt => `<option value="${String(opt.value).replace(/"/g,'&quot;')}">${opt.label || opt.value}</option>`).join('');
          form.appendChild(sel);
          control = sel;
        } else {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'assist-text';
          inp.placeholder = friendlyMissingLabel(pendingField);
          form.appendChild(inp);
          control = inp;
        }
        boxEl.appendChild(form);
        const hint = document.createElement('div');
        hint.className = 'assist-hint';
        if (String((pendingField.route_key || pendingField.name || '')).trim() === 'depart_date' || String((pendingField.route_key || pendingField.name || '')).trim() === 'return_date') {
          hint.textContent = 'Enter date in YYYY-MM-DD or 01-Apr-2026 format';
        } else {
          hint.textContent = fieldReplyHint(pendingField) || '';
        }
        if (hint.textContent) boxEl.appendChild(hint);
        boxEl._field = pendingField;
        boxEl._control = control;
        grid.appendChild(boxEl);
      });
      card.appendChild(grid);

      const btnRow = document.createElement('div');
      btnRow.className = 'assist-btn-row';
      const continueBtn = document.createElement('button');
      continueBtn.type = 'button';
      continueBtn.className = 'assist-small-btn';

      btnRow.appendChild(continueBtn);
      card.appendChild(btnRow);

      const foot = document.createElement('div');
      foot.className = 'assist-hint';
      foot.textContent = 'Use the fields above to continue. Chat typing is temporarily disabled during this correction step.';
      card.appendChild(foot);
      wrap.appendChild(card);

      continueBtn.addEventListener('click', async () => {
        const merged = Object.assign({}, chatState.pendingMissingField ? chatState.pendingMissingField.routePayload : {}, chatState.lastRoutePayload || {});
        let hasError = false;
        [...grid.children].forEach((child) => {
          child.style.borderColor = '';
          const fld = child._field;
          const ctl = child._control;
          const raw = ctl && 'value' in ctl ? String(ctl.value || '').trim() : '';
          const resolved = resolveMissingFieldAnswer(raw, fld);
          if (!resolved && String((fld && (fld.route_key || fld.name)) || '').trim() !== 'preferred_airline') {
            hasError = true;
            child.style.borderColor = '#fca5a5';
            return;
          }
          const routeKey = fld.route_key || fld.name;
          if (!routeKey) return;
          if (resolved) merged[routeKey] = resolved;
          else if (routeKey === 'preferred_airline') merged[routeKey] = '';
        });
        if (hasError) {
          appendMessage('assistant', 'Please review the highlighted details and choose valid values before I continue.');
          return;
        }
        clearPendingMissingField();
        chatState.lastRoutePayload = merged;
        saveState();
        setBusy(true);
        try {
          await routeToSearch(merged);
        } catch (err) {
          resetSearchSelectionState();
          appendMessage('assistant', providerConnectionMessage(err.message || 'Unable to continue with the selected details right now.'));
        } finally { setBusy(false); }
      });
    });
  }


  function cardAirlineLabel(card){ return Array.isArray(card.airlines) ? card.airlines.join(' / ') : ''; }
  function formatPrice(v){ const n = Number(v || 0); return Number.isFinite(n) ? formatAmount(Math.round(n), 0) : '0'; }
  function formatTripType(value){ return String(value || '').replace(/_/g, ' ').trim() || ''; }
  function formatShortDate(value){
    const raw = String(value || '').trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    const d = new Date(raw + 'T00:00:00');
    if (Number.isNaN(d.getTime())) return raw;
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' }).replace(',', '');
  }

  function filterAndRenderResults(container, bundle){
    if (container && container.dataset && container.dataset.resultsLocked === 'Y') {
      return;
    }
    const results = Array.isArray(bundle.results) ? bundle.results.slice() : [];
    const stopsVal = container.querySelector('[data-filter="stops"]').value;
    const airVal = container.querySelector('[data-filter="airline"]').value;
    const minVal = Number(container.querySelector('[data-filter="min_price"]').value || 0);
    const maxVal = Number(container.querySelector('[data-filter="max_price"]').value || 0);
    let filtered = results.filter(r => {
      if (stopsVal !== '' && Number(r.stop_count || 0) !== Number(stopsVal)) return false;
      if (airVal && !(Array.isArray(r.airlines) && r.airlines.some(a => String(a).toUpperCase().includes(String(airVal).toUpperCase())))) return false;
      const p = Number(r.price_total || 0);
      if (minVal && p < minVal) return false;
      if (maxVal && p > maxVal) return false;
      return true;
    });
    const list = container.querySelector('.llm-result-list');
    list.innerHTML = '';
    chatState.visibleFlightResults = filtered;
    saveState();
    const totalInfo = container.querySelector('.llm-results-sub');
    totalInfo.textContent = `Found ${results.length} flight(s). Showing ${filtered.length} after current filters.`;
    if (!filtered.length) {
      list.innerHTML = '<div class="llm-empty">No flights match the selected in-chat filters.</div>';
      return;
    }
    filtered.forEach((card, idx) => list.appendChild(buildResultCard(card, idx)));
  }

  function computeFareStageSelection(stage){
    const cm = stage && stage.confirm_model ? stage.confirm_model : {};
    const sf = cm.selected_fare || {};
    const stateSel = stage.selection || {};
    return {
      outbound_fare_id: String(stateSel.outbound_fare_id || sf.outbound_fare_id || ''),
      return_fare_id: String(stateSel.return_fare_id || sf.return_fare_id || ''),
      fare_combo_key: String(stateSel.fare_combo_key || sf.fare_combo_key || ''),
      total: Number(stateSel.total || sf.total || 0),
      currency: String(stateSel.currency || sf.currency || ''),
      display_family: String(stateSel.display_family || sf.display_family || '')
    };
  }

  function updateFareStageSelection(stage){
    const cm = stage && stage.confirm_model ? stage.confirm_model : {};
    const selection = stage.selection || {};
    const outboundId = String(selection.outbound_fare_id || '');
    const returnId = String(selection.return_fare_id || '');
    const tripType = String(cm.trip_type || 'ONE_WAY');
    const outboundCards = Array.isArray(cm.outbound_fare_cards) ? cm.outbound_fare_cards : [];
    const returnCards = Array.isArray(cm.return_fare_cards) ? cm.return_fare_cards : [];
    const outCard = outboundCards.find(f => String(f.fare_id || '') === outboundId) || outboundCards[0] || {};
    const retCard = tripType === 'ROUND_TRIP' ? (returnCards.find(f => String(f.fare_id || '') === returnId) || returnCards[0] || {}) : {};
    const outTotal = Number(outCard.total || 0);
    const retTotal = Number(retCard.total || 0);
    const total = outTotal + retTotal;
    const currency = String(outCard.currency || retCard.currency || '');
    const outFamily = String(outCard.fare_family || '');
    const retFamily = String(retCard.fare_family || '');
    const displayFamily = tripType === 'ROUND_TRIP' && retFamily ? `${outFamily} + ${retFamily}` : outFamily;
    let fareComboKey = '';
    const selectedOption = stage.selected_fare_option || {};
    const selectedSel = selectedOption.selection || {};
    if (String(selectedSel.outbound_fare_id || '') === outboundId && String(selectedSel.return_fare_id || '') === returnId) fareComboKey = String(selectedOption.fare_combo_key || '');
    const allOptions = (cm._all_fare_options || cm.fare_options || stage.fare_options || []);
    if (!fareComboKey && Array.isArray(allOptions)) {
      const hit = allOptions.find(opt => { const sel = (opt && opt.selection) || {}; return String(sel.outbound_fare_id || '') === outboundId && String(sel.return_fare_id || '') === returnId; });
      if (hit) fareComboKey = String(hit.fare_combo_key || '');
    }
    stage.selection = { outbound_fare_id: outboundId, return_fare_id: returnId, total, currency, display_family: displayFamily, fare_combo_key: fareComboKey };
    return stage.selection;
  }

  function disableElement(el, hide=false){
    if (!el) return;
    if (hide) {
      el.style.display = 'none';
      return;
    }
    if ('disabled' in el) el.disabled = true;
    el.classList.add('is-disabled');
    el.setAttribute('aria-disabled', 'true');
    if (el.tagName === 'A') {
      el.removeAttribute('href');
      el.removeAttribute('target');
      el.removeAttribute('rel');
    }
  }

  function lockPriorBookingControls(){
    document.querySelectorAll('.llm-select-option-btn').forEach(el => disableElement(el, true));
    document.querySelectorAll('.llm-traveler-actions').forEach(el => disableElement(el, true));
    document.querySelectorAll('[data-action="confirm-booking"],[data-action="cancel-booking"],[data-action="start-new-search"]').forEach(el => disableElement(el, true));
    document.querySelectorAll('.llm-fare-card input[type="radio"]').forEach(el => {
      el.disabled = true;
      el.tabIndex = -1;
      el.style.display = 'none';
      const parent = el.closest('.llm-fare-card');
      if (parent) parent.style.pointerEvents = 'none';
    });
  }

  function hardResetLlmChatAndReload(){
    clearFlowState();
    try {
      const params = new URLSearchParams();
      params.set('fresh', '1');
      params.set('hard_reset', '1');
      params.set('t', String(Date.now()));
      window.location.replace(window.location.pathname + '?' + params.toString());
    } catch (e) {
      window.location.href = '/portal/llm/chat?fresh=1&hard_reset=1&t=' + Date.now();
    }
  }

  function updateExistingBookingCard(stage, options){

  async function startNewSearchFromCurrentRequest(triggerEl){
    const routePayload = Object.assign({}, chatState.lastRoutePayload || {});
    const hasRoute = Object.keys(routePayload).length > 0;
    if (!hasRoute) {
      appendMessage("assistant", "I cannot restart the search because the original search request is not available in this chat session. Please type a new travel request.");
      setInputContext("travel_request");
      return;
    }

    if (triggerEl) {
      markControlLocked(triggerEl, "A new search has already been started.");
      triggerEl.textContent = "Starting New Search...";
    }

    lockPriorBookingControls();

    chatState.selectedResult = null;
    chatState.selectedFareStage = null;
    chatState.selectedTravelerStage = null;
    chatState.bookingSummaryStage = null;
    chatState.pendingMissingField = null;
    saveState();

    appendMessage("assistant", "Starting a new search using the same travel request. I will fetch fresh available flight options now.");
    setBusy(true);
    try {
      await routeToSearch(routePayload);
    } catch (err) {
      appendMessage("assistant", providerConnectionMessage(err.message || "Unable to start a new search right now."));
    } finally {
      setBusy(false);
    }
  }

  function renderPreBookingCard(stage){

      const parent = document.createElement('div');

      const selectedResult = (lockedFareStage.selected_result && typeof lockedFareStage.selected_result === 'object') ? lockedFareStage.selected_result : {};

      const tripType = String(cm.trip_type || stage.trip_type || 'ONE_WAY');
      const outbound = selectedResult.outbound || {};

      function selectedFareCard(cards, fareId){
        const list = Array.isArray(cards) ? cards : [];

      function fareSummaryCard(f, label){

      const selOut = selectedFareCard(cm.outbound_fare_cards, effectiveSelection.outbound_fare_id || (cm.selected_fare||{}).outbound_fare_id);
      const selRet = tripType === 'ROUND_TRIP' ? selectedFareCard(cm.return_fare_cards, effectiveSelection.return_fare_id || (cm.selected_fare||{}).return_fare_id) : {};
      const previewCurrency = String((stage.selected_fare && stage.selected_fare.currency) || effectiveSelection.currency || selOut.currency || selRet.currency || '').trim();

      const totalDisplay = previewTotalAmount > 0

      const totalFamily = effectiveSelection.display_family || (tripType === 'ROUND_TRIP' ? [selOut.fare_family || '', selRet.fare_family || ''].filter(Boolean).join(' + ') : (selOut.fare_family || ''));

        if (ret && Object.keys(ret).length) {
          routeParts.push(`<div class="llm-fare-block">${buildLegCard('Return', ret).outerHTML}</div>`);

          const remainingMs = Math.max(0, 1000 - (Date.now() - startedAt));

  async function submitMessage(){
    if (chatInputLocked) return;
    const currentModeGuard = String((chatState.inputContext && chatState.inputContext.mode) || 'travel_request');
    if (['traveler_action', 'traveler_select', 'traveler_review', 'booking_review', 'payment_pending', 'missing_fields_review', 'completed'].includes(currentModeGuard)) return;
    const text = (input.value || '').trim();
    if (!text) return;
    appendMessage('user', text);
    input.value = '';
    input.focus();

    const currentContextMode = String((chatState.inputContext && chatState.inputContext.mode) || 'travel_request');
    if (currentContextMode === 'flight_option' && !chatState.pendingMissingField) {
      if (!parseTypedFlightOption(text) && looksLikeNewTravelRequest(text)) {
        resetSearchSelectionState();
      } else {
        await handleTypedFlightOption(text);
        return;
      }
    }

    if (currentContextMode === 'fare_option' && !chatState.pendingMissingField) {
      handleTypedFareOption(text);
      return;
    }

    if (chatState.pendingMissingField) {
      setBusy(true);
      try { const handled = await submitPendingMissingField(text); if (handled) return; }
      catch (err) { appendMessage('assistant', providerConnectionMessage(err.message || 'Unable to continue with the missing detail right now.')); }
      finally { setBusy(false); }
      return;
    }

    setInputContext('travel_request');
    setBusy(true);
    try {
      const data = await callIntent(text);
      chatState.lastOriginalMessage = text;
      chatState.lastNormalizedIntent = data && data.normalized_intent ? data.normalized_intent : null;
      chatState.lastRoutePayload = data && data.route_payload ? data.route_payload : chatState.lastRoutePayload;
      saveState();
      const summary = buildSummary(data);
      if (data && data.next_action === 'SHOW_MESSAGE') {
        appendMessage('assistant', data.user_message || 'Please share your travel plan in one message, and I will guide you step by step.');
        setInputContext('travel_request');
        return;
      }
      if (data && data.next_action === 'ASK_MISSING_FIELDS') {
        clearInputContext('flight_option');
        rememberPendingMissingField(data);
        appendAssistantFieldPrompt(currentMissingField(), summary);
        return;
      }
      if (data && data.next_action === 'ROUTE_TO_SEARCH' && data.route_payload) {
        await routeToSearch(data.route_payload);
        return;
      }
      if (data && data.user_message) {
        appendMessage('assistant', data.user_message);
        setInputContext('travel_request');
        return;
      }
      appendMessage('assistant', 'Please share your travel plan in one message, including from city, to city, travel date, and passenger count.');
      setInputContext('travel_request');
    } catch (err) {
      resetSearchSelectionState();
      appendMessage('assistant', providerConnectionMessage(err.message || 'Unable to reach the travel assistant right now. Please try again.'));
    } finally { setBusy(false); }
  }


  async function processPaymentReturnIfNeeded(forcedBookingRef, forcedPaymentDone){
    try {
      const params = new URLSearchParams(window.location.search || '');
      const bookingRef = String(forcedBookingRef || params.get('booking_ref') || '').trim();
      const paymentDone = forcedPaymentDone ? '1' : String(params.get('payment_done') || '').trim();
      if (!bookingRef || paymentDone !== '1') return;
      if (lastPaymentHandledRef === bookingRef) return;
      setBusy(true, 'Refreshing payment status...');

      let data = null;
      for (let attempt = 0; attempt < 6; attempt += 1) {
        data = await callBookingStatus(bookingRef);
        const status = String((data && data.payment_status) || (data && data.status) || '').toUpperCase();
        if (status === 'SUCCESS' || status === 'PAID' || status === 'PAYMENT_DONE') break;
        if (attempt < 5) {
          await new Promise(resolve => setTimeout(resolve, 700));
        }
      }

      const status = String((data && data.payment_status) || (data && data.status) || '').toUpperCase();
      if (status === 'SUCCESS' || status === 'PAID' || status === 'PAYMENT_DONE') {
        lastPaymentHandledRef = bookingRef;
        setInputContext('completed');
        setChatInputLocked(true);
        if (!updateExistingBookingCard(data, { hideCompletedButtons: true })) {
          renderCompactBookingSummary(data);
          document.querySelectorAll('.llm-parent-card[data-booking-ref] .assist-btn-row').forEach(el => disableElement(el, true));
        }
        appendPaymentCompletedActions(data);
      } else if (data && data.user_message) {
        appendMessage('assistant', data.user_message);
      }

      try { localStorage.removeItem(PAYMENT_EVENT_KEY); } catch (e) {}
      params.delete('payment_done');
      params.delete('booking_ref');
      const clean = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
      window.history.replaceState({}, '', clean);
    } catch (err) {
      appendMessage('assistant', providerConnectionMessage(err.message || 'Unable to refresh payment status right now.'));
    } finally {
      setBusy(false);
    }
  }

      if (payload.type === 'PAYMENT_DONE' && sameSession && payload.booking_ref) {

    }
  }
  if (chatState.bookingSummaryStage && String((chatState.bookingSummaryStage.payment_status || '')).toUpperCase() === 'SUCCESS') {
    const hasCompletedCard = !!document.querySelector('.llm-parent-card[data-booking-ref]');
    if (hasCompletedCard) {
      setChatInputLocked(true);
    } else {
      clearFlowState();
      setInputContext('travel_request');
    }
  } else {
    setInputContext((chatState.inputContext && chatState.inputContext.mode) || 'travel_request', Object.assign({}, chatState.inputContext || {}));
  }
  processPaymentReturnIfNeeded();
  if (initialSystemMsg) {
    let intro = 'Hello, welcome to Smart Trip. Please enter your flight request in one message with route, date, travellers, cabin class, and currency. I will validate it and guide you step by step.';
    if (chatState.pendingMissingField) intro = 'Welcome back. I still have your in-progress request and can continue from the last missing detail.';
    initialSystemMsg.querySelector('.msg-body').textContent = intro;
  }
  btn.addEventListener('click', submitMessage);
  input.addEventListener('keydown', function(ev){ if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); submitMessage(); } });
})();
</script>
{% endblock %}
